name: Sync Statistics to index.html

on:
  push:
    paths:
      - 'workshops.html'
      - 'researches.html'
      - 'projects.html'
      - 'lectures.html'
      - 'presentations.html'
      - 'seminars.html'
      - 'conferences.html'
      - 'field-visits.html'
      - 'students-index.html'
      - 'professors-index.html'

jobs:
  sync-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync stats data into index.html
        run: python3 sync_stats.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-sync statistics data in index.html"
          git push
