<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Big Data AI Club</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--navy:#0F1F3D;--indigo:#4361EE;--gold:#F8C200;--white:#fff;--surface:#F4F6FA;--border:#E2E7F0;--text:#1A2340;--muted:#5E6E8A;--radius:10px;--shadow:0 4px 16px rgba(15,31,61,.1);}
    html{font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--surface);}
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .login-box{background:var(--white);border-radius:14px;padding:48px 40px;max-width:420px;width:100%;box-shadow:var(--shadow);border-top:4px solid var(--indigo);text-align:center;}
    .login-box h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5em;font-weight:800;color:var(--navy);margin-bottom:8px;}
    .login-box p{color:var(--muted);font-size:.9em;margin-bottom:28px;}
    .google-btn{display:inline-flex;align-items:center;gap:12px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:12px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95em;font-weight:600;color:var(--navy);cursor:pointer;width:100%;justify-content:center;transition:box-shadow .2s;}
    .google-btn:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);}
    .google-btn img{width:20px;}
    .login-spinner{display:none;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loginError{display:none;margin-top:14px;background:#FFF3F3;border:1px solid #FFCDD2;border-radius:8px;padding:12px;font-size:.85em;color:#C62828;}
    #appShell{display:none;min-height:100vh;}
    .topbar{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .topbar-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:var(--white);font-size:1.05em;}
    .topbar-title span{color:var(--gold);}
    .topbar-user{display:flex;align-items:center;gap:10px;}
    .topbar-user img{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.3);}
    .topbar-user span{color:rgba(255,255,255,.85);font-size:.85em;}
    .signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:rgba(255,255,255,.8);padding:4px 12px;cursor:pointer;font-size:.8em;font-family:inherit;}
    .layout{display:flex;min-height:calc(100vh - 56px);}
    .sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;overflow-y:auto;}
    .sidebar-section{padding:8px 16px 4px;font-size:.72em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:.88em;font-weight:500;color:var(--muted);cursor:pointer;transition:background .15s,color .15s;border-left:3px solid transparent;}
    .sidebar-item:hover{background:var(--surface);color:var(--navy);}
    .sidebar-item.active{background:var(--surface);color:var(--indigo);border-left-color:var(--indigo);font-weight:600;}
    .sidebar-item .icon{font-size:1.1em;width:20px;text-align:center;}
    .main{flex:1;padding:28px;overflow-y:auto;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .page-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3em;font-weight:800;color:var(--navy);}
    .page-subtitle{font-size:.85em;color:var(--muted);margin-top:2px;}
    .stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:box-shadow .2s;}
    .stat-card:hover{box-shadow:var(--shadow);}
    .stat-card .num{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.8em;font-weight:800;color:var(--indigo);}
    .stat-card .lbl{font-size:.75em;color:var(--muted);margin-top:4px;}
    .btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:.88em;font-weight:700;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--indigo);color:#fff;}
    .btn-primary:hover{background:#3350D0;}
    .btn-danger{background:#C62828;color:#fff;}
    .btn-danger:hover{background:#B71C1C;}
    .btn-secondary{background:var(--surface);color:var(--navy);border:1.5px solid var(--border);}
    .btn-secondary:hover{border-color:var(--indigo);color:var(--indigo);}
    .btn-sm{padding:5px 12px;font-size:.8em;}
    .table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
    .table-toolbar{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .search-input{flex:1;min-width:200px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88em;outline:none;}
    .search-input:focus{border-color:var(--indigo);}
    table{width:100%;border-collapse:collapse;}
    th{padding:10px 16px;text-align:left;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);}
    td{padding:11px 16px;font-size:.88em;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#fafbfc;}
    .badge{display:inline-block;font-size:.72em;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--surface);color:var(--navy);border:1px solid var(--border);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,16,32,.7);z-index:9999;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:14px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .modal-header{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:center;}
    .modal-header h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:var(--navy);font-size:1.1em;}
    .modal-close{background:none;border:none;font-size:1.5em;cursor:pointer;color:var(--muted);}
    .modal-body{padding:20px 28px 28px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-group.full{grid-column:1/-1;}
    label{font-size:.8em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
    input,select,textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9em;color:var(--text);outline:none;transition:border-color .2s;}
    input:focus,select:focus,textarea:focus{border-color:var(--indigo);}
    textarea{min-height:90px;resize:vertical;}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:.88em;font-weight:600;box-shadow:var(--shadow);display:none;align-items:center;gap:8px;z-index:99999;}
    #toast.show{display:flex;}
    #toast.success{background:#1B5E20;}
    #toast.error{background:#B71C1C;}
    .saving-overlay{display:none;position:fixed;inset:0;background:rgba(10,16,32,.5);z-index:99998;align-items:center;justify-content:center;}
    .saving-overlay.open{display:flex;}
    .saving-box{background:var(--white);border-radius:12px;padding:28px 36px;text-align:center;}
    .saving-box .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
    .btn-group{display:flex;gap:6px;}
    .info-banner{background:#EEF2FF;border:1px solid #c7d2fe;border-radius:10px;padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2.5em;margin-bottom:14px;">⚙️</div>
    <h1>Admin Panel</h1>
    <p id="loginMsg">Big Data AI Club — University of Baghdad<br>Sign in with your admin Google account.</p>
    <div class="login-spinner" id="loginSpinner"></div>
    <button class="google-btn" id="loginBtn" onclick="doSignIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      Sign in with Google
    </button>
    <div id="loginError"></div>
  </div>
</div>

<div id="appShell">
  <div class="topbar">
    <div class="topbar-title">🏛️ Big Data AI Club &nbsp;<span>Admin</span></div>
    <div class="topbar-user">
      <img id="adminAvatar" src="" alt="">
      <span id="adminName"></span>
      <button class="signout-btn" onclick="changeToken()" style="margin-right:6px;">🔑 Token</button><button class="signout-btn" onclick="doSignOut()">Sign out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="mainContent"></div>
  </div>
</div>

<div class="modal-overlay" id="entryModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Entry</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);margin-bottom:20px;">Delete <strong id="deleteTitle"></strong>? This cannot be undone.</p>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">🗑️ Delete</button>
      </div>
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay">
  <div class="saving-box">
    <div class="spinner"></div>
    <p id="savingMsg">Saving...</p>
  </div>
</div>

<div id="toast"></div>





<script>
// ── Config ──
var GITHUB_TOKEN = localStorage.getItem('bdai_gh_token') || '';
var GITHUB_OWNER = 'University-of-Baghdad-College-of-AI';

var PAGES = [
  { id:'conferences',   repo:'Big_Data_AI_Club_Baghdad',   file:'conferences.html',   label:'Conferences',   icon:'🏛️' },
  { id:'courses',       repo:'Big_Data_AI_Club_Baghdad',   file:'courses.html',       label:'Courses',       icon:'📖' },
  { id:'field-visits',  repo:'Big_Data_AI_Club_Baghdad',   file:'field-visits.html',  label:'Field Visits',  icon:'🌍' },
  { id:'internships',   repo:'Big_Data_AI_Club_Baghdad',   file:'internships.html',   label:'Internships',   icon:'💼' },
  { id:'lectures',      repo:'Big_Data_AI_Club_Baghdad',   file:'lectures.html',      label:'Lectures',      icon:'🎓' },
  { id:'presentations', repo:'Big_Data_AI_Club_Baghdad',   file:'presentations.html', label:'Presentations', icon:'📈' },
  { id:'projects',      repo:'Big_Data_AI_Club_Baghdad',   file:'projects.html',      label:'Projects',      icon:'🔧' },
  { id:'researches',    repo:'Big_Data_AI_Club_Baghdad',   file:'researches.html',    label:'Researches',    icon:'🔬' },
  { id:'seminars',      repo:'Big_Data_AI_Club_Baghdad',   file:'seminars.html',      label:'Seminars',      icon:'🎯' },
  { id:'workshops',     repo:'Big_Data_AI_Club_Baghdad',   file:'workshops.html',     label:'Workshops',     icon:'🛠️' },
  { id:'announcements', repo:'Big_Data_AI_Club_Baghdad',   file:'announcements.html', label:'Announcements', icon:'📢', mode:'simple', dataVar:'allAnnouncements' },
  { id:'news',          repo:'Big_Data_AI_Club_Baghdad',   file:'news.html',          label:'News',          icon:'📰', mode:'simple', dataVar:'allNews' },
  { id:'members',       repo:'Big_Data_AI_Club_Baghdad',   file:'members.html',       label:'Members',       icon:'👥', mode:'members', dataVar:'allMembers' },
  { id:'students',      repo:'Big_Data_AI_Club_Students',  file:'index.html',         label:'Students Submissions', sidebarLabel:'Students', icon:'🎓', hasFiles:true },
  { id:'professors',    repo:'Big_Data_AI_Club_Professors',file:'index.html',         label:'Professors Submissions', sidebarLabel:'Professors', icon:'📚', hasFiles:true },
];

var PAGE_MAP = {};
PAGES.forEach(function(p) { PAGE_MAP[p.id] = p; });

var currentPage = 'dashboard';
var currentData = [];
var editIndex = -1;
var deleteIndex = -1;
var fileCache = {};
var shaCache = {};

// ── Init ──
window.initAdmin = function() {
  buildSidebar();
  // Check if token is saved
  if (!localStorage.getItem('bdai_gh_token')) {
    showTokenPrompt();
  } else {
    GITHUB_TOKEN = localStorage.getItem('bdai_gh_token');
    showPage('dashboard');
  }
};

function showTokenPrompt() {
  var mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="max-width:480px;margin:60px auto;background:var(--white);border-radius:14px;padding:40px;border:1px solid var(--border);border-top:4px solid var(--gold);box-shadow:var(--shadow);">' +
    '<div style="font-size:2em;margin-bottom:12px;">🔑</div>' +
    '<h2 style="font-family:sans-serif;font-weight:800;color:var(--navy);margin-bottom:8px;">GitHub Token Required</h2>' +
    '<p style="color:var(--muted);font-size:.9em;margin-bottom:20px;line-height:1.6;">Enter your GitHub Personal Access Token (with <strong>repo</strong> scope). It will be saved in your browser only — never uploaded to GitHub.</p>' +
    '<input type="password" id="tokenInput" placeholder="ghp_..." style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95em;margin-bottom:12px;outline:none;">' +
    '<p style="font-size:.78em;color:var(--muted);margin-bottom:16px;">Get a token at: <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--indigo);">github.com/settings/tokens/new</a> → check <strong>repo</strong> scope</p>' +
    '<button class="btn btn-primary" id="saveTokenBtn" style="width:100%;">Save Token & Continue</button>' +
    '<div id="tokenError" style="display:none;margin-top:10px;color:#C62828;font-size:.85em;"></div>' +
  '</div>';

  document.getElementById('saveTokenBtn').addEventListener('click', function() {
    var t = document.getElementById('tokenInput').value.trim();
    if (!t) { document.getElementById('tokenError').style.display='block'; document.getElementById('tokenError').textContent='Please enter a token.'; return; }
    // Test token
    document.getElementById('saveTokenBtn').textContent = 'Testing...';
    document.getElementById('saveTokenBtn').disabled = true;
    fetch('https://api.github.com/repos/University-of-Baghdad-College-of-AI/Big_Data_AI_Club_Baghdad/contents/conferences.html', {
      headers: { 'Authorization': 'token ' + t, 'Accept': 'application/vnd.github.v3+json' }
    }).then(function(r) {
      if (r.ok) {
        localStorage.setItem('bdai_gh_token', t);
        GITHUB_TOKEN = t;
        showPage('dashboard');
      } else {
        document.getElementById('tokenError').style.display='block';
        document.getElementById('tokenError').textContent = '❌ Invalid token (error ' + r.status + '). Please check and try again.';
        document.getElementById('saveTokenBtn').textContent = 'Save Token & Continue';
        document.getElementById('saveTokenBtn').disabled = false;
      }
    }).catch(function() {
      document.getElementById('tokenError').style.display='block';
      document.getElementById('tokenError').textContent = '❌ Could not connect. Check your internet connection.';
      document.getElementById('saveTokenBtn').textContent = 'Save Token & Continue';
      document.getElementById('saveTokenBtn').disabled = false;
    });
  });

  document.getElementById('tokenInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('saveTokenBtn').click();
  });
}

// ── Sidebar ──
function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var html = '';
  html += '<div class="sidebar-section">Dashboard</div>';
  html += sidebarItem('dashboard', '📊', 'Overview');
  html += '<div class="sidebar-section">Activities</div>';
  var actIds = ['conferences','courses','field-visits','internships','lectures','presentations','projects','researches','seminars','workshops'];
  actIds.forEach(function(id) {
    var p = PAGE_MAP[id];
    html += sidebarItem(id, p.icon, p.label);
  });
  html += '<div class="sidebar-section">Content</div>';
  ['announcements','news','members'].forEach(function(id) {
    var p = PAGE_MAP[id];
    html += sidebarItem(id, p.icon, p.label);
  });
  html += '<div class="sidebar-section">Submissions</div>';
  ['students','professors'].forEach(function(id) {
    var p = PAGE_MAP[id];
    html += sidebarItem(id, p.icon, p.label, p.sidebarLabel);
  });
  sb.innerHTML = html;
  sb.querySelectorAll('.sidebar-item').forEach(function(el) {
    el.addEventListener('click', function() {
      showPage(el.dataset.page);
    });
  });
}

function sidebarItem(id, icon, label, sidebarLabel) {
  var display = sidebarLabel || label;
  return '<div class="sidebar-item" data-page="' + id + '" id="nav-' + id + '">' +
    '<span class="icon">' + icon + '</span> ' + display + '</div>';
}

// ── Navigation ──
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-item').forEach(function(el) { el.classList.remove('active'); });
  var navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  if (page === 'dashboard') { renderDashboard(); return; }
  loadPage(page);
}

// ── Dashboard ──
function renderDashboard() {
  var now = new Date();
  var lastAccess = localStorage.getItem('admin_last_access');
  localStorage.setItem('admin_last_access', now.toISOString());

  var mc = document.getElementById('mainContent');
  var html = '<div class="page-header">' +
    '<div><div class="page-title">📊 Dashboard</div>' +
    '<div class="page-subtitle">Overview of all club content</div></div>' +
    '<button class="btn btn-secondary" id="refreshDashBtn">↺ Refresh</button>' +
  '</div>';

  if (lastAccess) {
    var last = new Date(lastAccess);
    var diff = Math.floor((now - last) / 60000);
    var ago = diff < 1 ? 'just now' : diff < 60 ? diff + ' min ago' : diff < 1440 ? Math.floor(diff/60) + ' hr ago' : Math.floor(diff/1440) + ' day(s) ago';
    html += '<div class="info-banner">🕐 <div><div style="font-size:.82em;color:var(--muted);">Last admin access</div>' +
      '<div style="font-weight:700;color:var(--navy);">' + last.toLocaleString('en-GB') + ' (' + ago + ')</div></div></div>';
  }

  html += '<div class="stat-row">';
  PAGES.forEach(function(p) {
    var count = fileCache[p.id] ? fileCache[p.id].length : '—';
    html += '<div class="stat-card" data-page="' + p.id + '"><div class="num">' + count + '</div><div class="lbl">' + p.label + '</div></div>';
  });
  html += '</div>';

  html += '<div class="table-wrap"><div class="table-toolbar" style="font-weight:600;color:var(--navy);">Quick Access' +
    '<span style="font-size:.8em;color:var(--muted);margin-left:auto;">Refreshed: ' + now.toLocaleTimeString('en-GB') + '</span></div>';
  html += '<table><thead><tr><th>Section</th><th>Entries</th><th>Repo</th><th>Action</th></tr></thead><tbody>';
  PAGES.forEach(function(p) {
    var count = fileCache[p.id] ? fileCache[p.id].length : '—';
    html += '<tr><td><strong>' + p.icon + ' ' + p.label + '</strong></td>' +
      '<td><span class="badge">' + count + '</span></td>' +
      '<td style="color:var(--muted);font-size:.82em;">' + p.repo + '</td>' +
      '<td><button class="btn btn-secondary btn-sm" data-page="' + p.id + '">Manage →</button></td></tr>';
  });
  html += '</tbody></table></div>';
  mc.innerHTML = html;

  mc.querySelectorAll('[data-page]').forEach(function(el) {
    el.addEventListener('click', function() { showPage(el.dataset.page); });
  });

  document.getElementById('refreshDashBtn').addEventListener('click', function() {
    fileCache = {};
    renderDashboard();
    showToast('🔄 Refreshed', 'success');
  });
}

// ── Load Page ──
function loadPage(page) {
  var cfg = PAGE_MAP[page];
  document.getElementById('mainContent').innerHTML = '<p style="padding:40px;color:var(--muted);">Loading ' + cfg.label + '...</p>';
  fetchFile(cfg.repo, cfg.file, function(content, sha) {
    var varName = cfg.dataVar || 'allData';
    var data = extractData(content, varName);
    fileCache[page] = data;
    shaCache[page] = sha;
    currentData = data;
    renderTable(page, data, content);
  });
}

// ── GitHub API ──
function ghHeaders() {
  return {
    'Authorization': 'token ' + GITHUB_TOKEN,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

function fetchFile(repo, file, callback) {
  var url = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + repo + '/contents/' + file;
  fetch(url, { headers: ghHeaders() })
    .then(function(r) {
      if (!r.ok) throw new Error('GitHub API error ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var content = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
      callback(content, data.sha);
    })
    .catch(function(e) {
      document.getElementById('mainContent').innerHTML =
        '<div style="padding:40px;"><h3 style="color:#C62828;margin-bottom:8px;">⚠️ Failed to load</h3>' +
        '<p style="color:var(--muted);">' + e.message + '</p>' +
        '<button class="btn btn-secondary" style="margin-top:16px;" id="retryBtn">↺ Retry</button></div>';
      document.getElementById('retryBtn').addEventListener('click', function() { loadPage(currentPage); });
    });
}

function saveFile(repo, file, content, sha, message, callback) {
  var url = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + repo + '/contents/' + file;
  var encoded = btoa(unescape(encodeURIComponent(content)));
  fetch(url, {
    method: 'PUT', headers: ghHeaders(),
    body: JSON.stringify({ message: message, content: encoded, sha: sha })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) { callback(null, data); })
  .catch(function(e) { callback(e); });
}

// ── Data Extract/Inject ──
function extractData(html, varName) {
  var re = new RegExp('var ' + varName + ' = (\\[[\\s\\S]*?\\]);');
  var m = html.match(re);
  if (!m) return [];
  try { return JSON.parse(m[1]); } catch(e) { return []; }
}

function injectData(html, data, varName, mode) {
  var fmt = 'var ' + varName + ' = [\n\n';
  data.forEach(function(item, i) {
    fmt += '      {\n';
    if (mode === 'simple') {
      fmt += '        "date"  : ' + JSON.stringify(item.date||'') + ',\n';
      fmt += '        "text"  : ' + JSON.stringify(item.text||'') + '\n';
    } else if (mode === 'members') {
      fmt += '        "name"  : ' + JSON.stringify(item.name||'') + ',\n';
      fmt += '        "role"  : ' + JSON.stringify(item.role||'') + ',\n';
      fmt += '        "dept"  : ' + JSON.stringify(item.dept||'') + ',\n';
      fmt += '        "email" : ' + JSON.stringify(item.email||'') + '\n';
    } else {
      fmt += '        "type"  : ' + JSON.stringify(item.type||'') + ',\n';
      fmt += '        "year"  : ' + JSON.stringify(item.year||'') + ',\n';
      fmt += '        "title" : ' + JSON.stringify(item.title||'') + ',\n';
      fmt += '        "desc"  : ' + JSON.stringify(item.desc||'') + ',\n';
      fmt += '        "who"   : ' + JSON.stringify(item.who||'') + ',\n';
      fmt += '        "date"  : ' + JSON.stringify(item.date||'') + ',\n';
      fmt += '        "link"  : ' + JSON.stringify(item.link||'#') + '\n';
    }
    fmt += '      }' + (i < data.length-1 ? ',' : '') + '\n\n';
  });
  fmt += '    ];';
  var re = new RegExp('var ' + varName + ' = \\[[\\s\\S]*?\\];');
  return html.replace(re, fmt);
}

function uploadToGitHub(repo, path, base64Content, name, callback) {
  // Check if file exists first to get SHA
  var url = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + repo + '/contents/' + path;
  fetch(url, { headers: ghHeaders() })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = { message: '⬆️ Upload: ' + name, content: base64Content };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
    })
    .then(function(r) {
      if (r.ok) callback(null);
      else r.json().then(function(e) { callback(e.message || 'Upload failed'); });
    })
    .catch(function(e) { callback(e.message); });
}

              h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">';
              h += '<div style="flex:1;min-width:200px;">';
              h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
                '<span style="background:var(--navy);color:#fff;font-size:.72em;font-weight:700;padding:2px 8px;border-radius:20px;min-width:26px;text-align:center;">' + num + '</span>' +
                '<span style="font-family:sans-serif;font-weight:700;color:var(--navy);font-size:.95em;">' + title2 + '</span></div>';
              h += '<div style="font-size:.82em;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;">';
              h += '<span>👤 ' + who2 + '</span><span>📅 ' + pair.year + '</span>';
              if (pair.pdf) h += '<span style="color:#C62828;font-weight:600;">📄 PDF</span>';
              if (pair.json) h += '<span style="color:#1565C0;font-weight:600;">{ } JSON</span>';
              h += '</div></div>';
              h += '<div class="btn-group" style="flex-shrink:0;">';
              if (pair.pdf) {
                h += '<a href="' + pair.pdf.download_url + '" target="_blank" class="btn btn-secondary btn-sm">⬇ PDF</a>';
                h += '<button class="btn btn-danger btn-sm" data-repo="' + repo2 + '" data-path="' + pair.pdf.path + '" data-sha="' + pair.pdf.sha + '" data-name="' + pair.pdf.name + '" onclick="deleteFile(this)">🗑️ PDF</button>';
              }
              if (pair.json) {
                h += '<a href="' + pair.json.download_url + '" target="_blank" class="btn btn-secondary btn-sm">⬇ JSON</a>';
                h += '<button class="btn btn-danger btn-sm" data-repo="' + repo2 + '" data-path="' + pair.json.path + '" data-sha="' + pair.json.sha + '" data-name="' + pair.json.name + '" onclick="deleteFile(this)">🗑️ JSON</button>';
              }
              h += '</div></div></div>';
            });
            listEl.innerHTML = h;

            // Update active button
            var pgEl = document.getElementById('pg_' + yearId);
            if (pgEl) pgEl.querySelectorAll('.pg-btn').forEach(function(b) {
              b.style.background = b.dataset.page == page ? 'var(--indigo)' : '';
              b.style.color = b.dataset.page == page ? '#fff' : '';
              b.style.borderColor = b.dataset.page == page ? 'var(--indigo)' : '';
            });
          });
        });
      });
    })
    .catch(function() { list.innerHTML = '<p style="color:var(--muted);">Could not load files.</p>'; });
}

window.deleteFile = function(btn) {
  var repo = btn.dataset.repo, path = btn.dataset.path, sha = btn.dataset.sha, name = btn.dataset.name;
  if (!confirm('Delete "' + name + '"?')) return;
  showSaving('Deleting...');
  fetch('https://api.github.com/repos/' + GITHUB_OWNER + '/' + repo + '/contents/' + path, {
    method: 'DELETE', headers: ghHeaders(),
    body: JSON.stringify({ message: '🗑️ Delete ' + name, sha: sha })
  })
  .then(function() { hideSaving(); showToast('✅ File deleted!', 'success'); loadPage(currentPage); })
  .catch(function(e) { hideSaving(); showToast('❌ ' + e.message, 'error'); });
};

// ── Modals ──
function getFormFields(cfg) {
  var mode = cfg.mode || 'full';
  if (mode === 'simple') {
    return '<div class="form-group full"><label>Date</label><input type="text" id="fDate" placeholder="e.g. June 18, 2026"></div>' +
      '<div class="form-group full"><label>Text</label><textarea id="fText" placeholder="Announcement or news text..."></textarea></div>';
  }
  if (mode === 'members') {
    return '<div class="form-group full"><label>Full Name</label><input type="text" id="fName" placeholder="e.g. Dr. Jalal Hameed"></div>' +
      '<div class="form-group"><label>Role / Position</label><input type="text" id="fRole" placeholder="e.g. Club Supervisor"></div>' +
      '<div class="form-group"><label>Department</label><input type="text" id="fDept" placeholder="e.g. Big Data Department"></div>' +
      '<div class="form-group full"><label>Email (optional)</label><input type="text" id="fEmail" placeholder="email@uobaghdad.edu.iq"></div>';
  }
  // Full mode
  var typeOptions = ['research','project','software','ai','ml','nlp','bigdata','data','publication','lecture','workshop','seminar','conference','presentation','tech','industry','academic','gov','lab','uni','programming','tools','ethics','career','national','international','local','organized','resource','file','other'];
  var yearOptions = ['2030','2029','2028','2027','2026','2025','2024','2023'];
  return '<div class="form-group"><label>Type</label><select id="fType">' + typeOptions.map(function(t){return '<option value="'+t+'">'+t+'</option>';}).join('') + '</select></div>' +
    '<div class="form-group"><label>Year</label><select id="fYear">' + yearOptions.map(function(y){return '<option value="'+y+'">'+y+'</option>';}).join('') + '</select></div>' +
    '<div class="form-group full"><label>Title</label><input type="text" id="fTitle" placeholder="Entry title"></div>' +
    '<div class="form-group full"><label>Description</label><textarea id="fDesc" placeholder="Description..."></textarea></div>' +
    '<div class="form-group"><label>Author / Who</label><input type="text" id="fWho" placeholder="e.g. Dr. Jalal Hameed"></div>' +
    '<div class="form-group"><label>Date</label><input type="text" id="fDate" placeholder="e.g. June 2026"></div>' +
    '<div class="form-group full"><label>Link (optional)</label><input type="text" id="fLink" placeholder="https://..."></div>';
}

function openAddModal(cfg, originalHtml) {
  editIndex = -1;
  document.getElementById('modalTitle').textContent = 'Add New Entry';
  document.getElementById('modalBody').innerHTML =
    '<div class="form-grid">' + getFormFields(cfg) + '</div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn btn-primary" id="saveEntryBtn">💾 Save Entry</button>' +
    '</div>';
  document.getElementById('entryModal').classList.add('open');
  document.getElementById('saveEntryBtn').addEventListener('click', function() { saveEntry(cfg, originalHtml); });
}

function openEditModal(idx, cfg, originalHtml) {
  editIndex = idx;
  var item = currentData[idx];
  var mode = cfg.mode || 'full';
  document.getElementById('modalTitle').textContent = 'Edit Entry';
  document.getElementById('modalBody').innerHTML =
    '<div class="form-grid">' + getFormFields(cfg) + '</div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="btn btn-primary" id="saveEntryBtn">💾 Save Entry</button>' +
    '</div>';

  // Fill values
  if (mode === 'simple') {
    document.getElementById('fDate').value = item.date || '';
    document.getElementById('fText').value = item.text || '';
  } else if (mode === 'members') {
    document.getElementById('fName').value = item.name || '';
    document.getElementById('fRole').value = item.role || '';
    document.getElementById('fDept').value = item.dept || '';
    document.getElementById('fEmail').value = item.email || '';
  } else {
    document.getElementById('fType').value = item.type || 'research';
    document.getElementById('fYear').value = item.year || '2026';
    document.getElementById('fTitle').value = item.title || '';
    document.getElementById('fDesc').value = item.desc || '';
    document.getElementById('fWho').value = item.who || '';
    document.getElementById('fDate').value = item.date || '';
    document.getElementById('fLink').value = item.link || '#';
  }

  document.getElementById('entryModal').classList.add('open');
  document.getElementById('saveEntryBtn').addEventListener('click', function() { saveEntry(cfg, originalHtml); });
}

function closeModal() { document.getElementById('entryModal').classList.remove('open'); }

function saveEntry(cfg, originalHtml) {
  var mode = cfg.mode || 'full';
  var entry;
  if (mode === 'simple') {
    entry = { date: document.getElementById('fDate').value.trim(), text: document.getElementById('fText').value.trim() };
    if (!entry.text) { alert('Text is required.'); return; }
  } else if (mode === 'members') {
    entry = { name: document.getElementById('fName').value.trim(), role: document.getElementById('fRole').value.trim(), dept: document.getElementById('fDept').value.trim(), email: document.getElementById('fEmail').value.trim() };
    if (!entry.name) { alert('Name is required.'); return; }
  } else {
    entry = { type: document.getElementById('fType').value, year: document.getElementById('fYear').value, title: document.getElementById('fTitle').value.trim(), desc: document.getElementById('fDesc').value.trim(), who: document.getElementById('fWho').value.trim(), date: document.getElementById('fDate').value.trim(), link: document.getElementById('fLink').value.trim() || '#' };
    if (!entry.title) { alert('Title is required.'); return; }
  }

  if (editIndex === -1) { currentData.unshift(entry); }
  else { currentData[editIndex] = entry; }

  closeModal();
  commitData(cfg, originalHtml, editIndex === -1 ? 'Add: ' + (entry.title||entry.text||entry.name) : 'Edit: ' + (entry.title||entry.text||entry.name));
}

function openDeleteModal(idx) {
  deleteIndex = idx;
  var item = currentData[idx];
  document.getElementById('deleteTitle').textContent = '"' + (item.title||item.text||item.name||'this entry') + '"';
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); }
function confirmDelete() {
  var name = currentData[deleteIndex].title || currentData[deleteIndex].text || currentData[deleteIndex].name;
  currentData.splice(deleteIndex, 1);
  closeConfirm();
  var cfg = PAGE_MAP[currentPage];
  fetchFile(cfg.repo, cfg.file, function(html, sha) {
    shaCache[currentPage] = sha;
    commitData(cfg, html, 'Delete: ' + name);
  });
}

// ── Commit ──
function commitData(cfg, originalHtml, message) {
  showSaving('Saving to GitHub...');
  var sha = shaCache[currentPage];
  if (!sha) {
    fetchFile(cfg.repo, cfg.file, function(html, newSha) {
      shaCache[currentPage] = newSha;
      doCommit(cfg, html, message, newSha);
    });
    return;
  }
  doCommit(cfg, originalHtml, message, sha);
}

function doCommit(cfg, originalHtml, message, sha) {
  // Re-fetch to get fresh content and SHA
  fetchFile(cfg.repo, cfg.file, function(freshHtml, freshSha) {
    var varName = cfg.dataVar || 'allData';
    var newContent = injectData(freshHtml, currentData, varName, cfg.mode);
    saveFile(cfg.repo, cfg.file, newContent, freshSha, '⚙️ Admin: ' + message, function(err, result) {
      hideSaving();
      if (err) {
        showToast('❌ Save failed: ' + err.message, 'error');
      } else {
        fileCache[currentPage] = currentData;
        showToast('✅ Saved!', 'success');
        loadPage(currentPage);
      }
    });
  });
}

// ── UI Helpers ──
function showSaving(msg) { document.getElementById('savingMsg').textContent = msg; document.getElementById('savingOverlay').classList.add('open'); }
function hideSaving() { document.getElementById('savingOverlay').classList.remove('open'); }
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + (type||'');
  setTimeout(function() { t.className = ''; }, 3500);
}

window.changeToken = function() {
  if (confirm('Reset your GitHub token?')) {
    localStorage.removeItem('bdai_gh_token');
    GITHUB_TOKEN = '';
    showTokenPrompt();
  }
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
});
</script>
