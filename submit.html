<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <header>
    <img src="coai-english-logo.png" alt="Club Logo" class="club-logo">
    <h1>Big Data Artificial Intelligence Club</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>

  <section>
    <h2>Submit Your Workshop or Project</h2>
    <p>Fill out the form below to share your work. Submissions will be reviewed before being published on the website.</p>

    <!-- Submission Form -->
    <form action="mailto:jalal.hameed@uobaghdad.edu.iq" method="post" enctype="text/plain">
      <label for="title">Title:</label>
      <input type="text" id="title" name="title" required>

      <label for="description">Description:</label>
      <textarea id="description" name="description" rows="6" required></textarea>

      <label for="code">Code Snippet (optional):</label>
      <textarea id="code" name="code" rows="6"></textarea>

      <label for="image">Image URL (optional):</label>
      <input type="url" id="image" name="image">

      <button type="submit">Submit</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Big Data Artificial Intelligence Club</p>
  </footer>
